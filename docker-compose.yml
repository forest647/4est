services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./src:/var/www
      - ./old:/old:ro
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mariadb:11
    ports:
      - "3307:3306"
    environment:
      MARIADB_DATABASE: 4est
      MARIADB_ROOT_PASSWORD: secret
      MARIADB_USER: 4est
      MARIADB_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  node:
    image: node:20-alpine
    volumes:
      - ./src:/var/www
    working_dir: /var/www
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"

volumes:
  db_data:
